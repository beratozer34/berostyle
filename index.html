<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEROSTYLE v6.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg-base: #020203; --neon-cyan: #00f2fe; --neon-red: #ff1744; --text-pure: #ffffff; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        .phone-wrapper { width: 100vw; height: 100vh; max-width: 480px; margin: auto; background: var(--bg-base); position: relative; border-left: 1px solid #222; border-right: 1px solid #222; }
        .screen { position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg-base); z-index:10; }
        .hidden { display: none; }
        .badge { background: #ff1744; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: 900; }
        .verified-gold { color: gold; margin-left: 5px; }
        .verified-blue { color: #1da1f2; margin-left: 5px; }
        #toast-container { position: absolute; top: 20px; width: 100%; z-index: 9999; text-align: center; }
        .toast { background: #111; border: 1px solid var(--neon-cyan); padding: 10px; margin: 5px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="phone-wrapper" id="app">
        <!-- Arayüzün devamı 2. ve 3. parçada gelecek -->
        <script>
        const App = {
            users: JSON.parse(localStorage.getItem('berostyle_users_db') || '{}'),
            
            // Twitter/X Tarzı Rozet Engine
            renderBadge: function(username, isAdmin, status) {
                if (username === 'beratozer' || isAdmin) 
                    return `<span class="verified-gold" title="Kurucu">👑</span>`;
                if (status === 'onaylı') 
                    return `<span class="verified-blue" title="Onaylı Üye">✔</span>`;
                return `<span style="font-size:10px;">⏳</span>`;
            },

            // DM'deki Kırmızı Bildirim Sayısı
            updateDMNotification: function(roomId, count) {
                const badge = document.getElementById('badge-' + roomId);
                if (badge) {
                    badge.innerText = count > 0 ? count : '';
                    badge.style.display = count > 0 ? 'inline-block' : 'none';
                }
            },

            // Mesaj Silme Fonksiyonu
            deleteMessage: function(roomId, msgId) {
                if (confirm("Mesajı silmek istiyor musun?")) {
                    // Firebase ve LocalDB temizleme mantığı buraya
                    console.log("Mesaj silindi: " + msgId);
                }
            },

            // Story Silme Fonksiyonu
            deleteStory: function(storyId) {
                if (confirm("Hikayeyi silmek istiyor musun?")) {
                    // Hikaye temizleme mantığı
                    console.log("Hikaye silindi: " + storyId);
                }
            }
        };

        // Kullanıcı listesini rozetli şekilde render etme
        function renderUserList() {
            const list = document.getElementById('dm-list');
            Object.keys(App.users).forEach(un => {
                const u = App.users[un];
                const badge = App.renderBadge(u.username, u.isAdmin, u.status);
                list.innerHTML += `
                    <div class="user-item">
                        <span>${u.username} ${badge}</span>
                        <span class="badge" id="badge-${u.username}">0</span>
                    </div>`;
            });
        }
    </script>
    <!-- 3. PARÇA: ADMIN YÖNETİM PANELİ VE SİSTEM İZOLASYONU -->
    <div id="admin-panel" class="admin-panel">
        <h2 style="color:var(--neon-cyan);">⚡ KURUCU YÖNETİM PANELİ</h2>
        <div id="manage-users-list"></div>
    </div>

    <script>
        // ADMIN İZOLASYONU (Sadece beratozer görebilir)
        const currentUser = JSON.parse(localStorage.getItem('berostyle_active_session') || '{}');
        
        function loadAdminPanel() {
            if (currentUser.username === 'beratozer') {
                document.getElementById('admin-panel').style.display = 'block';
                renderAdminUsers();
            }
        }

        // KULLANICIYI AĞDAN TAMAMEN SİLME VE BANLAMA
        function banUser(username) {
            if(username === 'beratozer') { alert("Kendi kendini silemezsin!"); return; }
            if(confirm(username + " adlı kullanıcıyı ağdan tamamen silmek ve banlamak istiyor musun?")) {
                // Firebase & LocalDB Silme
                delete App.users[username];
                localStorage.setItem('berostyle_users_db', JSON.stringify(App.users));
                
                // UI Güncelle
                renderAdminUsers();
                alert("Kullanıcı ağdan silindi.");
            }
        }

        function renderAdminUsers() {
            const adminList = document.getElementById('manage-users-list');
            adminList.innerHTML = '';
            
            Object.keys(App.users).forEach(un => {
                if (un === 'beratozer') return;
                adminList.innerHTML += `
                    <div style="padding:10px; border-bottom:1px solid #333;">
                        <span>${un}</span>
                        <button onclick="banUser('${un}')" style="background:red; color:#fff;">BANLA / SİL</button>
                    </div>`;
            });
        }

        // Uygulamayı başlat
        loadAdminPanel();
    </script>
</body>
</html>
